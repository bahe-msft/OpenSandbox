name: Publish Patched Egress To GHCR

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: envoy-mitm-static

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/opensandbox-egress:${{ inputs.image_tag }}"
          docker buildx build \
            --platform linux/amd64 \
            -f components/egress/Dockerfile \
            --build-arg VERSION="${{ inputs.image_tag }}" \
            --build-arg GIT_COMMIT="${{ github.sha }}" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$IMAGE" \
            --push \
            .
